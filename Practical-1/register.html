<!DOCTYPE html>
<html>
    <head>
        <title>Student Hub Portal | Register</title>

    </head>
    <body>

        <h2>Register Page</h2>
        <p>This is register page. You have to enter your details to create an account.</p>

       <form>
        <label for="name">Full Name:*  </label>
        <input type="text" name="name" id="name" required>
        <br><br>
        <label for="password">Password: * </label>
        <input type="password" name="password" id="password" required><br><br>
        <label for="emailid">Email ID: * </label>
        <input type="email" name="emailid" id="emailid" required><br><br>
        <label for="contact">Contact No: * </label>
        <input type="text" name="contact" id="contact" required><br><br>
        <label for="address">Address: * </label>
        <textarea name="address" id="address" required></textarea><br><br>
        <label for="pincode">Pin Code:* </label>
        <input type="number" name="pincode" id="pincode" required><br><br>
        <label for="dateofbirth">Date of Birth: *</label>
        <input type="date" name="dateofbirth" id="dateofbirth" required><br><br>
        <label for="gender">Gender: *</label>
        <select name="gender" id="gender" required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select><br><br>
        <label for="department">Department: *</label>
        <select name="department" id="department" required>
            <option value="">Select Department</option>
            <option value="Computer_Engineering">Computer Engineering</option>
            <option value="Computer_Science_and_Engineering">Computer Science and Engineering</option>
            <option value="Information_Technology">Information Technology</option>
            <option value="Electrical_Engineering">Electrical Engineering</option>
            <option value="Mechanical_Engineering">Mechanical Engineering</option>
            <option value="Civil_Engineering">Civil Engineering</option>
        </select><br><br>

       <button type="submit" >Submit</button>


</form>
<br> <br>
         <footer>@2026 Student Hub Portal</footer>
    </body>
</html>
